<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="S.H.A.D.O.W (Smart Hand and Audio Driven Operating Wizard)"
    />
    <link rel="icon" href="./fav.ico" type="image/x-icon" />
    <title>S.H.A.D.O.W</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <main
      class="relative w-full h-screen flex flex-col items-center bg-white gap-10 overflow-hidden"
    >
      <div class="w-full h-full">
        <img
          src="./images/Ravenwood.jpg"
          alt=""
          class="w-full h-full object-cover"
        />
      </div>
      <div class="absolute z-[99] w-full h-full bg-black/60"></div>
      <div
        class="absolute z-[999] w-full h-full flex flex-col items-center justify-center gap-10"
      >
        <div class="text-center p-4 bg-white/10 mt-10 rounded-xl gap-5">
          <h1 class="text-5xl text-yellow-500 font-semibold">S.H.A.D.O.W</h1>
          <p class="text-xl text-white font-semibold tracking-wider">
            <span class="text-red-400">S</span>mart
            <span class="text-red-400">H</span>and and
            <span class="text-red-400">A</span>udio
            <span class="text-red-400">D</span>riven
            <span class="text-red-400">O</span>perating
            <span class="text-red-400">W</span>izard
          </p>
        </div>
        <div class="w-full h-full flex justify-center items-center">
          <div class="w-[80%] flex justify-center items-center relative">
            <img
              src="./images/wizard.png"
              class="w-[40%] h-[65%] object-contain bg-none"
              alt="shadow"
            />
            <button id="startAssistant">
              <img
                src="./images/voice.png"
                alt="voice"
                title="Voice Assistant"
                class="absolute top-[50px] left-80 w-20 h-20 p-2 bg-zinc-300 rounded-full cursor-pointer hover:scale-120 hover:rotate-360 duration-900 transition-transform shadow-xl shadow-red-600 hover:shadow-blue-600"
              />
            </button>
            <img
              src="./images/mouse.png"
              alt="mouse"
              title="Virtual Mouse"
              class="absolute top-[50px] right-80 w-20 h-20 p-2 bg-zinc-300 rounded-full cursor-pointer hover:scale-120 hover:rotate-[-20deg] duration-300 transition-transform shadow-xl shadow-red-600 hover:shadow-blue-600"
            />
            <img
              src="./images/keyboard.png"
              alt="keyboard"
              title="Virtual Keyboard"
              class="absolute bottom-35 left-80 w-20 h-20 p-2 bg-zinc-300 rounded-full cursor-pointer hover:scale-120 transition-transform shadow-xl shadow-red-600 hover:shadow-blue-600"
            />
            <img
              src="./images/exit.png"
              alt="exit"
              title="Exit"
              class="absolute bottom-35 right-80 w-20 h-20 bg-zinc-300 rounded-full cursor-pointer hover:scale-120 transition-transform shadow-xl shadow-red-600 hover:shadow-blue-600"
            />
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
